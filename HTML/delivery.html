<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spice Delight</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style1.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="#">Spice Delight</a>
<button class="btn btn-warning" onclick="showCart()">
Cart <span class="badge bg-danger" id="cart-count">0</span>
</button>
</div>
</nav>
<div class="container-fluid text-white text-center py-5 hero-banner">
<h1>Spice Delight</h1>
<p>Fresh food delivered to your doorstep.</p>
</div>
<div class="container text-center mt-4">
<button class="btn btn-dark" onclick="renderMenu('all')">Show All</button>
<button class="btn btn-success" onclick="renderMenu('veg')">Pure Veg</button>
<button class="btn btn-danger" onclick="renderMenu('non-veg')">Non-Veg</button>
</div>
<div class="container mt-4">
<div class="row" id="menu-container">
</div>
</div>
<div class="modal fade" id="cartModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Your Cart</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<ul id="cart-items" class="list-group">
</ul>
<h4 class="mt-3 text-end">Total: ₹<span id="cart-total">0</span></h4>
</div>
<div class="modal-footer">
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
<button type="button" class="btn btn-success" onclick="openCheckout()">Checkout</button>
</div>
</div>
</div>
</div>
<div class="modal fade" id="ingredientsModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ing-title">Ingredients</h5> <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p id="ing-text">Loading...</p> </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="checkoutModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Checkout</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">
<div class="mb-3">
<label class="form-label">Name</label>
<input type="text" class="form-control" id="customer-name" placeholder="Enter your name">
</div>
<div class="mb-3">
<label class="form-label">Address</label>
<textarea class="form-control" id="customer-address" rows="3" placeholder="Enter delivery address"></textarea>
</div>
</div>
<div class="modal-footer">
<button type="button" class="btn btn-success w-100" onclick="confirmOrder()">Place Order</button>
</div>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
