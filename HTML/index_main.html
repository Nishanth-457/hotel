<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white" style="padding-top: 100px;">
<div class="container" style="width: 300px;">
<div class="card p-4">
<h3 class="text-center text-dark">Login</h3>
<br>
<label class="text-dark">Username:</label>
<input type="text" id="u" class="form-control" placeholder="username">
<br>
<label class="text-dark">Password:</label>
<input type="password" id="p" class="form-control" placeholder="password">
<br>
<button class="btn btn-danger w-100" onclick="login()">Enter</button>
</div>
</div>
<script>
function login() {
let user = document.getElementById("u").value;
let pass = document.getElementById("p").value;
if (user === "admin" && pass === "1234") {
window.location.href = "delivery.html";
} else {
alert("Wrong Password!");
}
}
</script>
</body>
</html>
